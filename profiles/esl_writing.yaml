domain_name: ESL Writing Feedback

method_claim: Feedback Safety Graph review routing

feedback_safety_graph:
  description: >
    Item-level deploy-time graph linking the student target span, AI suggestion,
    predicted rubric dimension, evidence status, active safety signals, and
    routing decision. The graph supports auditability without using gold labels
    or teacher annotations at deployment time.
  nodes:
    - target_span
    - surrounding_context
    - ai_suggestion
    - ai_rationale
    - predicted_issue_type
    - evidence_signal
    - safety_dimension
    - routing_decision
  safety_dimensions:
    - local_edit
    - meaning_preservation
    - content_grounding
    - pedagogical_tone
    - specificity
    - model_agreement

issue_types:
  - grammar
  - punctuation
  - vocabulary
  - sentence_structure
  - coherence
  - organization
  - task_response
  - unsupported_claim
  - argument_clarity
  - tone_register
  - meaning_change
  - overcorrection
  - wrong_correction
  - other

feedback_correctness_labels:
  - correct
  - partially_correct
  - incorrect
  - unclear

meaning_preservation_labels:
  - preserves_meaning
  - changes_meaning
  - unclear

teacher_safety_labels:
  - safe_to_show_student
  - unsafe_without_revision
  - uncertain_needs_review

teacher_acceptability_labels:
  - accept
  - edit
  - reject
  - uncertain

risk_levels:
  low:
    description: Local grammar, spelling, or wording edit that preserves the student's intended meaning.
  medium:
    description: Revision advice that may affect expression, organization, or argument clarity.
  high:
    description: Feedback that may be incorrect, over-written, misleading, or may change the student's intended meaning.

recommended_actions:
  - auto_accept
  - teacher_review
  - reject
  - needs_more_evidence

review_output_fields:
  - risk_score
  - review_confidence
  - evidence_signal
  - review_priority
  - review_explanation
  - safety_graph_active_dimensions
  - safety_graph_active_signals
  - safety_graph_path
  - safety_graph_summary
  - safety_graph_nodes
  - safety_graph_edges

risk_reasons:
  - local_language_edit
  - wrong_correction
  - meaning_change
  - overcorrection
  - introduces_new_argument
  - too_vague
  - too_harsh
  - unsupported_claim
  - task_mismatch
  - low_model_agreement
  - parse_error

rubric_dimensions:
  - task_response
  - organization
  - coherence
  - grammar
  - vocabulary
  - tone_register
